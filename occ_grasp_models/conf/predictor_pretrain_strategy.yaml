# predictor_pretrain_strategy.yaml (separated strategy/phase stage)

data_root: /mnt/rlbench_data  # RLBench dataset root
train_tasks: [bimanual_edge_phone, bimanual_pivot_phone, bimanual_pick_plate, bimanual_pick_fork]  # train split tasks (will add .train suffix)
eval_tasks: [bimanual_edge_phone, bimanual_pivot_phone, bimanual_pick_plate, bimanual_pick_fork]   # eval split tasks (no suffix)

# index paths (build_predictor_index.py outputs)
train_index_path: /home/hdliu/arm_test/multi_task/predictor_index_train.json  # built from .train demos
eval_index_path: /home/hdliu/arm_test/multi_task/predictor_index_eval.json    # built from eval demos

# image & cameras
camera_names: ["over_shoulder_left", "over_shoulder_right", "overhead", "wrist_right", "wrist_left", "front"]
img_size: 256  # RGB resize; must match keypoint 2D supervision scale

# model arch (match ACT_BC_KEYPOINT_STRATEGY)
backbone: resnet50
hidden_dim: 512
position_embedding: sine
lr_backbone: 3e-6
dilation: False
masks: False
input_dim: 16       # qpos dim for bimanual (matches ACT)
num_strategies: 3
num_phases: 4

keypoint_predictor:
  num_heads: 8
  num_layers: 2
  dropout: 0.1

# strategy predictor (stronger dropout for strategy stage)
strategy_predictor:
  dropout: 0.2

# separated training mode (joint training disabled)
train_mode: strategy
init_ckpt_path: /path/to/predictor_kp_XXXXXX.pt  # required: keypoint ckpt
save_prefix: predictor_sp
freeze_backbone: true
freeze_keypoint: true
freeze_strategy: false
save_modules:
  backbone: false
  keypoint: false
  strategy: true

# loss weights (strategy/phase only)
proj_2d_weight: 0.0
aff_vis_weight: 0.0
strategy_weight: 0.2
phase_weight: 0.5

# train
batch_size: 128
num_epochs: 8
lr: 5e-6
weight_decay: 1e-5
save_dir: /home/hdliu/arm_test/multi_task/predictor_ckpt_sp  # ckpt output directory
train_stats_path: /home/hdliu/arm_test/multi_task/predictor_train_stats.pkl  # cached qpos stats
log_dir: /home/hdliu/arm_test/multi_task/predictor_pretrain_logs_sp  # pretrain metrics output (csv/tb)
tensorboard_logging: False

# aux-eval sampling (optional, same style as aux_eval_samples)
aux_eval:
  enabled: True
  sample_every_n_steps: 20
  max_samples_per_epoch: 6
  sample_camera: over_shoulder_right
  save_path: /home/hdliu/arm_test/multi_task/predictor_pretrain_logs_sp/aux_eval_samples
  sample_min_width: 300
  sample_output_scale: 0.0
