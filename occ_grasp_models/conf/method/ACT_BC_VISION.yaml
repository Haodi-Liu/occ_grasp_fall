# @package _group_

name: 'ACT_BC_VISION'

# Agent
robot_name: 'bimanual'
agent_type: 'bimanual'


train_demo_path: ${rlbench.demo_path}

activation: lrelu
lr: 1.0e-05
weight_decay: 0.0001
grad_clip: 0.1
demo_augmentation: True
demo_augmentation_every_n: 10

prev_action_horizon: 1
next_action_horizon: 100

# hyperparameters
lr_backbone: 3.0e-06
backbone: resnet50
dilation: False
position_embedding: sine
kl_weight: 10
chunk_size: ${method.next_action_horizon}

# transformer
input_dim: 16 # 7 revolute joints + 1 gripper joints per arm (8 per arm, 16 total)
enc_layers: 4
dec_layers: 7
dim_feedforward: 3200
hidden_dim: 512
dropout: 0.1
nheads: 8
num_queries: ${method.next_action_horizon}
pre_norm: False

# unused
masks: False

# vision-only - no language
camera_names: ${rlbench.cameras}

# NOTE: RLBench configuration (episode_length, arm_action_mode, action_mode) should be
# set in config.yaml or eval.yaml, not here. The previous +rlbench.* syntax was ineffective.
