# @package _group_
#
# ACT_BC_ENC_STRATEGY: Strategy and Phase Conditioned Action Chunking Transformer
#
# This configuration extends ACT_BC_ENC with:
# 1. Strategy type conditioning (EdgeHang/WallLever/PressTilt)
# 2. Phase type conditioning (PreManipulation/Grasp/ClearPath/Lift)
# 3. Auxiliary classification losses for strategy and phase prediction

name: 'ACT_BC_ENC_STRATEGY'

# Agent
robot_name: 'bimanual'
agent_type: 'bimanual'

train_demo_path: "/mnt/rlbench_data"

activation: lrelu
lr: 5e-5
weight_decay: 0.000001
grad_clip: 0.1
demo_augmentation: True
demo_augmentation_every_n: 10

prev_action_horizon: 1
next_action_horizon: 20

# hyperparameters
lr_backbone: 1e-5
backbone: resnet18
dilation: False
position_embedding: sine
kl_weight: 10
chunk_size: ${method.next_action_horizon}

# transformer
input_dim: 16 # 7 revolute joints + 1 gripper joints per arm (8 per arm, 16 total)
enc_layers: 4
dec_layers: 7
dim_feedforward: 3200
hidden_dim: 512
dropout: 0.1
nheads: 8
num_queries: ${method.next_action_horizon}
pre_norm: False

# === ACT_BC_ENC_STRATEGY specific settings ===
# Enable conditional encoder (injects qpos + image + strategy + phase features into CVAE encoder)
condition_encoder: True

# Use type embeddings to distinguish CLS/qpos/strategy/phase/image/action tokens in encoder
# Extended from 4 types (ACT_BC_ENC) to 6 types (ACT_BC_ENC_STRATEGY)
encoder_use_type_embed: True

# === Strategy and Phase Configuration ===
# Number of strategy types:
#   0: EdgeHang (edge overhang grasp)
#   1: WallLever (wall lever grasp)
#   2: PressTilt (press tilt grasp)
num_strategies: 3

# Number of execution phases:
#   0: PreManipulation (create grasping space)
#   1: Grasp (grasp the object)
#   2: ClearPath (move auxiliary arm away)
#   3: Lift (lift the object)
num_phases: 4

# Auxiliary classification loss weights
# These losses encourage the model to understand the current manipulation context
strategy_weight: 0.2
phase_weight: 0.2

# unused
masks: False

# vision-only - no language
camera_names: ${rlbench.cameras}
