ddp:
    master_addr: "localhost"
    master_port: "0"
    num_devices: 1

rlbench:
    task_name: "multi"
    tasks: [bimanual_pick_plate, bimanual_pick_fork, bimanual_edge_phone, bimanual_pivot_phone]
    demos: 150
    demo_path: /mnt/rlbench_data
    episode_length: 400  # Must match eval.yaml for consistent time_in_state feature
    cameras: ["overhead"]
    camera_resolution: [256, 256] # 128*128
    scene_bounds: [-0.3, -0.5, 0.6, 0.7, 0.5, 1.6]
    include_lang_goal_in_obs: False

replay:
    batch_size: 16
    timesteps: 1
    prioritisation: False
    task_uniform: True # uniform sampling of tasks for multi-task buffers
    use_disk: True
    path: '/home/hdliu/arm/replay' # only used when use_disk is True.
    max_parallel_processes: 32

framework:
    log_freq: 500
    save_freq: 5000
    train_envs: 1
    replay_ratio: ${replay.batch_size}
    transitions_before_train: 200
    tensorboard_logging: True
    csv_logging: True
    training_iterations: 2000001
    gpu: 0
    env_gpu: 0
    logdir: '/home/hdliu/arm_test/bimanual_four_task'
    logging_level: 20 # https://docs.python.org/3/library/logging.html#levels
    seeds: 1
    start_seed: 0
    load_existing_weights: True
    num_weights_to_keep: 20 # older checkpoints will be deleted chronologically
    num_workers: 1
    record_every_n: 500
    checkpoint_name_prefix: "checkpoint"

defaults:
    - method: ACT_BC_VISION

hydra:
    run:
        dir: ${framework.logdir}/${rlbench.task_name}/${method.name}
