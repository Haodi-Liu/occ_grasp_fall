# predictor_pretrain_keypoint.yaml (separated keypoint stage)

data_root: /mnt/rlbench_data  # RLBench dataset root
train_tasks: [bimanual_edge_phone, bimanual_pivot_phone, bimanual_pick_plate, bimanual_pick_fork]  # train split tasks (will add .train suffix)
eval_tasks: [bimanual_edge_phone, bimanual_pivot_phone, bimanual_pick_plate, bimanual_pick_fork]   # eval split tasks (no suffix)

# index paths (build_predictor_index.py outputs)
train_index_path: /home/hdliu/arm_test/multi_task/predictor_index_train.json  # built from .train demos
eval_index_path: /home/hdliu/arm_test/multi_task/predictor_index_eval.json    # built from eval demos

# image & cameras
camera_names: ["over_shoulder_left", "over_shoulder_right", "overhead", "wrist_right", "wrist_left", "front"]
img_size: 256  # RGB resize; must match keypoint 2D supervision scale

# model arch (match ACT_BC_KEYPOINT_STRATEGY)
backbone: resnet50
hidden_dim: 512
position_embedding: sine
lr_backbone: 3e-6
dilation: False
masks: False
input_dim: 16       # qpos dim for bimanual (matches ACT)
num_strategies: 3
num_phases: 4

keypoint_predictor:
  num_heads: 8
  num_layers: 2
  dropout: 0.1

# strategy predictor (dropout kept default in keypoint stage)
strategy_predictor:
  dropout: 0.1

# separated training mode (joint training disabled)
train_mode: keypoint
init_ckpt_path: ""  # C3 warm-start checkpoint path
save_prefix: predictor_kp
freeze_backbone: false
freeze_keypoint: false
freeze_strategy: true
save_modules:
  backbone: true
  keypoint: true
  strategy: false

# C3 online replay config
online_train_index_path: ""  # online train index generated by build_dagger_index.py
online_eval_index_path: ""   # online eval index generated by build_dagger_index.py
offline_sample_weight: 0.8
online_sample_weight: 0.2
samples_per_epoch: 0  # 0=dataset size, >0=fixed samples per epoch

# DataLoader config
num_workers: 4
pin_memory: true

# loss weights (keypoint only)
proj_2d_weight: 1.0
aff_vis_weight: 0.2
strategy_weight: 0.0
phase_weight: 0.0

# train
batch_size: 128
num_epochs: 30
lr: 1e-5
weight_decay: 1e-6
save_dir: /home/hdliu/arm_test/multi_task/predictor_ckpt_kp  # ckpt output directory
train_stats_path: /home/hdliu/arm_test/multi_task/predictor_train_stats.pkl  # cached qpos stats
log_dir: /home/hdliu/arm_test/multi_task/predictor_pretrain_logs_kp  # pretrain metrics output (csv/tb)
tensorboard_logging: False

# aux-eval sampling (optional, same style as aux_eval_samples)
aux_eval:
  enabled: True
  sample_every_n_steps: 20
  max_samples_per_epoch: 6
  sample_camera: over_shoulder_right
  save_path: /home/hdliu/arm_test/multi_task/predictor_pretrain_logs_kp/aux_eval_samples
  sample_min_width: 300
  sample_output_scale: 0.0
